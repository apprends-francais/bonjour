<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bonjour — Learn French</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="styles.css?v=15" />
</head>
<body>
  <!-- App shell -->
  <div id="app">

    <!-- Sidebar navigation -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 100 100" fill="currentColor" aria-hidden="true">
            <path d="M50 6C44 20 44 32 50 43C56 32 56 20 50 6Z"/>
            <path d="M50 43C44 34 33 31 27 21C24 31 30 41 45 46C47 47 49 45 50 43Z"/>
            <path d="M50 43C56 34 67 31 73 21C76 31 70 41 55 46C53 47 51 45 50 43Z"/>
            <path d="M33 49C40 47 60 47 67 49L67 56C60 54 40 54 33 56Z"/>
            <path d="M43 56C41 67 44 79 50 88C56 79 59 67 57 56C54 57 46 57 43 56Z"/>
            <path d="M43 59C37 63 33 71 34 79C40 73 44 67 46 61Z"/>
            <path d="M57 59C63 63 67 71 66 79C60 73 56 67 54 61Z"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">Bonjour</span>
          <span class="brand-sub">apprends le français</span>
          <span class="gloss">learn French</span>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item" data-route="home"><span class="nav-ico" data-ico="home"></span> Home</button>
        <button class="nav-item" data-route="learn"><span class="nav-ico" data-ico="route"></span> Learning Path</button>
        <button class="nav-item" data-route="notes"><span class="nav-ico" data-ico="note"></span> Class Notes</button>
        <button class="nav-item" data-route="review"><span class="nav-ico" data-ico="refresh"></span> Review <span id="reviewBadge" class="badge hidden">0</span></button>
        <button class="nav-item" data-route="practice"><span class="nav-ico" data-ico="target"></span> Practice</button>
        <button class="nav-item" data-route="grammar"><span class="nav-ico" data-ico="book"></span> Grammar</button>
        <button class="nav-item" data-route="phrases"><span class="nav-ico" data-ico="message"></span> Phrasebook</button>
        <button class="nav-item" data-route="progress"><span class="nav-ico" data-ico="chart"></span> Progress</button>
      </nav>

      <div class="sidebar-foot">
        <div class="streak-pill" id="streakPill" title="Daily streak">
          <span class="flame" data-ico="flame"></span><span id="streakNum">0</span>
        </div>
        <button class="ghost-btn" id="voiceToggle" title="Toggle sound" data-ico="volume"></button>
      </div>
    </aside>

    <!-- Main content area — views are injected here -->
    <main class="main">
      <header class="topbar">
        <div id="topbarTitle" class="topbar-title">Home</div>
        <div class="topbar-stats">
          <div class="stat-chip xp" title="Total XP"><span data-ico="star"></span><span id="xpNum">0</span> XP</div>
          <div class="stat-chip lvl" title="Your level"><span data-ico="cap"></span> <span id="levelLabel">Débutant</span></div>
        </div>
      </header>
      <div id="view" class="view"></div>
    </main>
  </div>

  <!-- Lightweight toast container -->
  <div id="toast" class="toast hidden"></div>

  <!-- Templates pulled in by app.js are built dynamically; only data + logic needed here -->
  <script src="dict.js?v=10"></script>
  <script src="data.js?v=20"></script>
  <script src="app.js?v=21"></script>
</body>
</html>
